<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HealthyLife AI</title>
  <link rel="stylesheet" href="css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- ── AUTH SCREEN ─────────────────────────────────────── -->
  <div id="authScreen" class="auth-screen">
    <div class="auth-card">
      <div class="logo-bar">
        <div class="logo-icon">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14h-2V8h2v8zm-2-10V4h2v2h-2z"/>
          </svg>
        </div>
        <span class="logo-text">Healthy<span>Life</span> AI</span>
      </div>
      <p class="auth-tagline">Your personal AI-powered health companion</p>

      <div class="auth-tabs">
        <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
        <button class="auth-tab" onclick="switchAuthTab('register')">Register</button>
      </div>

      <div id="authLogin">
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="loginEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="loginPassword" placeholder="••••••••" />
        </div>
        <div id="loginError" class="auth-error"></div>
        <button class="btn-primary" onclick="login()">Login</button>
      </div>

      <div id="authRegister" style="display:none">
        <div class="form-group">
          <label>Full Name</label>
          <input type="text" id="regName" placeholder="Your name" />
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="you@example.com" />
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="regPassword" placeholder="Min. 6 characters" />
        </div>
        <div id="registerError" class="auth-error"></div>
        <button class="btn-primary" onclick="register()">Create Account</button>
      </div>
    </div>
  </div>

  <!-- ── MAIN APP ─────────────────────────────────────────── -->
  <div id="appScreen" style="display:none">

    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon sm">
          <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 2a10 10 0 1 0 0 20A10 10 0 0 0 12 2zm1 14h-2V8h2v8z"/>
          </svg>
        </div>
        <span class="logo-text sm">Healthy<span>Life</span></span>
      </div>

      <nav class="nav-links">
        <a class="nav-link active" data-page="dashboard" onclick="navigate('dashboard')">
          <span class="nav-icon">📊</span> Dashboard
        </a>
        <a class="nav-link" data-page="plan" onclick="navigate('plan')">
          <span class="nav-icon">🏋️</span> Weekly Plan
        </a>
        <a class="nav-link" data-page="tracker" onclick="navigate('tracker')">
          <span class="nav-icon">📈</span> Tracker
        </a>
        <a class="nav-link" data-page="chat" onclick="navigate('chat')">
          <span class="nav-icon">🤖</span> AI Chat
        </a>
        <a class="nav-link" data-page="diary" onclick="navigate('diary')">
          <span class="nav-icon">📔</span> Diary
        </a>
        <a class="nav-link" data-page="showcase" onclick="navigate('showcase')">
  <span class="nav-icon">✨</span> Showcase
</a>
      </nav>

      <div class="sidebar-footer">
        <div class="user-pill" id="userPill">
          <div class="avatar" id="userAvatar">?</div>
          <span id="userName">User</span>
        </div>
        <button class="btn-logout" onclick="logout()">Logout</button>
      </div>
    </aside>

    <!-- Main content area -->
    <main class="main-content">
      <div id="page-dashboard" class="page active"></div>
      <div id="page-plan"      class="page"></div>
      <div id="page-tracker"   class="page"></div>
      <div id="page-chat"      class="page"></div>
      <div id="page-diary"     class="page"></div>
      <div id="page-showcase"  class="page"></div>

    </main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/dashboard.js"></script>
  <script src="js/plan.js"></script>
  <script src="js/tracker.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/diary.js"></script> 
  <script src="js/showcase.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
